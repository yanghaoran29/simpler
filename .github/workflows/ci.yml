name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Python unit tests (no hardware) ----------
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.0
        with:
          extra_args: --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}

  ut-py:
    needs: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install numpy
          pip install ml_dtypes
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build nanobind extension
        run: pip install .

      - name: Run unit tests
        run: pytest tests -m "not requires_hardware" -v

  # ---------- Simulation scene tests ----------
  st-sim-a2a3:
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10']
        runtime: [host_build_graph, aicpu_build_graph, tensormap_and_ringbuffer]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up C++ compiler
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y g++-15 || sudo apt-get install -y g++
            if ! command -v g++-15; then sudo ln -s $(which g++) /usr/local/bin/g++-15; fi
          else
            brew install gcc@15 || brew install gcc
            if command -v g++-15; then
              echo "CXX=g++-15" >> $GITHUB_ENV
            else
              echo "CXX=g++" >> $GITHUB_ENV
            fi
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install numpy
          pip install ml_dtypes
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build nanobind extension
        run: pip install .

      - name: Run simulation examples (a2a3sim, ${{ matrix.runtime }})
        run: ./ci.sh -p a2a3sim -r ${{ matrix.runtime }} -c 6622890 -t 600 --clone-protocol https

  st-sim-a5:
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10']
        runtime: [host_build_graph, tensormap_and_ringbuffer]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up C++ compiler
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y g++-15 || sudo apt-get install -y g++
            if ! command -v g++-15; then sudo ln -s $(which g++) /usr/local/bin/g++-15; fi
          else
            brew install gcc@15 || brew install gcc
            if command -v g++-15; then
              echo "CXX=g++-15" >> $GITHUB_ENV
            else
              echo "CXX=g++" >> $GITHUB_ENV
            fi
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install numpy
          pip install ml_dtypes
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build nanobind extension
        run: pip install .

      - name: Run simulation examples (a5sim, ${{ matrix.runtime }})
        run: ./ci.sh -p a5sim -r ${{ matrix.runtime }} -c 6622890 -t 600 --clone-protocol https

  # ---------- Python unit tests (a2a3 hardware) ----------
  ut-py-a2a3:
    needs: pre-commit
    runs-on: [self-hosted, a2a3]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build nanobind extension
        run: pip install .

      - name: Run hardware unit tests (a2a3)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source ${ASCEND_HOME_PATH}/bin/setenv.bash && pytest tests -m requires_hardware --platform a2a3 -v

  # ---------- Scene tests (a2a3 hardware) ----------
  st-onboard-a2a3:
    needs: pre-commit
    runs-on: [self-hosted, a2a3]
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build nanobind extension
        run: pip install .

      - name: Run on-device examples (a2a3)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source ${ASCEND_HOME_PATH}/bin/setenv.bash && ./ci.sh -p a2a3 -d ${DEVICE_RANGE} --parallel -c 6622890 -t 600 --clone-protocol https

